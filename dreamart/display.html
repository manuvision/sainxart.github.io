<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream Art Daily Display</title>
  <meta name="description" content="A fullscreen daily Dream Art display: one procedural dreamscape from sleep data." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="dreamart-pointcloud.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05050b;
      --panel: rgba(10, 10, 22, 0.68);
      --panel-strong: rgba(10, 10, 22, 0.86);
	      --line: rgba(167, 139, 250, 0.36);
	      --accent: #a78bfa;
	      --accent-rgb: 167, 139, 250;
	      --text: #f4f1ff;
      --muted: #c7c0e5;
      --dim: #918cb4;
      --gold: #ffbd63;
      --font-ui: "Space Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --font-display: "Cormorant Garamond", Georgia, serif;
    }
    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      font-family: var(--font-ui);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(167,139,250,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,139,250,0.035) 1px, transparent 1px),
        radial-gradient(circle at 50% 40%, rgba(167,139,250,0.12), transparent 55%);
      background-size: 28px 28px, 28px 28px, 100% 100%;
      opacity: 0.55;
    }
    #display {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: clamp(14px, 3vw, 38px);
    }
    #stage {
      position: relative;
      width: min(100%, 180vh);
      height: 100%;
      border-radius: clamp(20px, 3vw, 46px);
      overflow: hidden;
	      border: 1px solid rgba(var(--accent-rgb), 0.72);
      background: radial-gradient(circle at 50% 34%, rgba(167,139,250,0.12), rgba(7,7,15,0.96) 62%);
	      box-shadow:
	        0 26px 90px rgba(0,0,0,0.55),
	        0 0 0 1px rgba(var(--accent-rgb), 0.1),
	        inset 0 0 90px rgba(var(--accent-rgb), 0.08);
    }
    #dream {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 900ms ease;
      touch-action: none;
    }
    #dream.ready { opacity: 1; }
    .overlay {
      position: absolute;
      z-index: 3;
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
      align-items: center;
      pointer-events: none;
    }
    #topline {
      left: clamp(18px, 3vw, 44px);
      top: clamp(18px, 3vw, 44px);
      right: clamp(18px, 3vw, 44px);
      justify-content: space-between;
    }
    #bottomline {
      left: clamp(18px, 3vw, 44px);
      right: clamp(18px, 3vw, 44px);
      bottom: clamp(18px, 3vw, 44px);
      align-items: flex-end;
      justify-content: space-between;
    }
    .pill {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.68rem 0.9rem;
      border-radius: 10px;
	      border: 1px solid rgba(var(--accent-rgb),0.68);
	      background: rgba(0, 0, 0, 0.69);
      color: var(--muted);
      text-decoration: none;
      font-size: clamp(0.65rem, 1.15vw, 0.88rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 34px rgba(0,0,0,0.24);
      white-space: nowrap;
    }
    button.pill {
      cursor: pointer;
      pointer-events: auto;
      font-family: var(--font-ui);
      appearance: none;
    }
    .sound-pill {
      width: 42px;
      min-width: 42px;
      height: 42px;
      min-height: 42px;
      justify-content: center;
      padding: 0;
      color: var(--gold);
      border-color: rgba(255,190,99,0.48);
      background: rgba(44, 29, 20, 0.48);
      font-size: clamp(1rem, 1.35vw, 1.18rem);
      letter-spacing: 0;
    }
    #brand {
      color: var(--gold);
      border-color: rgba(255,190,99,0.48);
      background: rgba(44, 29, 20, 0.48);
    }
    #url {
      color: var(--gold);
      border-color: rgba(255,190,99,0.48);
      background: rgba(44, 29, 20, 0.48);
      pointer-events: auto;
    }
    #score {
      color: var(--score-color, #c4b5fd);
    }
	    #date {
	      color: var(--text);
	    }
	    #date[role="button"] {
	      cursor: pointer;
	      pointer-events: auto;
	    }
    #titleBlock {
      max-width: min(46rem, 72vw);
      padding: clamp(0.9rem, 2vw, 1.35rem);
      border-radius: 18px;
	      border: 1px solid rgba(var(--accent-rgb),0.3);
      background: linear-gradient(180deg, rgba(10,10,22,0.18), rgba(10,10,22,0.76));
	      backdrop-filter: blur(16px);
	    }
	    .date-modal-backdrop {
	      position: fixed;
	      inset: 0;
	      z-index: 20;
	      display: none;
	      align-items: center;
	      justify-content: center;
	      padding: 1rem;
	      background: rgba(4, 4, 10, 0.72);
	      backdrop-filter: blur(18px);
	    }
	    .date-modal-backdrop.open {
	      display: flex;
	    }
	    .date-modal {
	      width: min(100%, 32rem);
	      border: 1px solid rgba(var(--accent-rgb),0.62);
	      border-radius: 24px;
	      background: rgba(11, 10, 24, 0.96);
	      box-shadow: 0 24px 90px rgba(0,0,0,0.55), 0 0 0 1px rgba(var(--accent-rgb),0.08);
	      padding: 1.15rem;
	    }
	    .date-fields {
	      display: grid;
	      gap: 0.85rem;
	    }
	    .date-picker-row {
	      display: grid;
	      grid-template-columns: 1fr auto;
	      gap: 0.75rem;
	      align-items: end;
	    }
	    .date-field label {
	      display: block;
	      margin-bottom: 0.45rem;
	      color: var(--dim);
	      font-size: 0.68rem;
	      letter-spacing: 0.18em;
	      text-transform: uppercase;
	    }
	    .date-field input {
	      width: 100%;
	      min-height: 52px;
	      border: 1px solid rgba(255,255,255,0.13);
	      border-radius: 10px;
	      background: rgba(4,4,10,0.9);
	      color: var(--text);
	      color-scheme: dark;
	      font: 0.9rem var(--font-ui);
	      letter-spacing: 0.04em;
	      padding: 0 0.9rem;
	    }
	    .date-today {
	      min-height: 52px;
	      border: 1px solid rgba(255,190,99,0.62);
	      border-radius: 10px;
	      background: rgba(44,29,20,0.52);
	      color: var(--gold);
	      font: 0.72rem var(--font-ui);
	      letter-spacing: 0.14em;
	      text-transform: uppercase;
	      padding: 0 1rem;
	      cursor: pointer;
	    }
	    .date-apply {
	      min-height: 52px;
	      border: 1px solid rgba(var(--accent-rgb),0.72);
	      border-radius: 10px;
	      background: rgba(var(--accent-rgb),0.16);
	      color: var(--text);
	      font: 0.78rem var(--font-ui);
	      letter-spacing: 0.16em;
	      text-transform: uppercase;
	      cursor: pointer;
	    }
	    @media (max-width: 390px) {
	      .date-picker-row {
	        grid-template-columns: 1fr;
	      }
	    }
	    .date-apply:hover {
	      background: rgba(var(--accent-rgb),0.24);
	    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 8vw, 7rem);
      font-weight: 300;
      font-style: italic;
      line-height: 0.9;
      letter-spacing: 0;
      color: var(--text);
      text-wrap: balance;
    }
    #reading {
      max-width: min(43rem, 70vw);
      color: var(--muted);
      font-size: clamp(0.82rem, 1.3vw, 1.1rem);
      line-height: 1.65;
      letter-spacing: 0.04em;
    }
    #status {
      color: var(--gold);
      border-color: rgba(255,190,99,0.42);
      background: rgba(44, 29, 20, 0.5);
    }
    #message {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
      background: radial-gradient(circle at 50% 45%, rgba(167,139,250,0.11), rgba(5,5,11,0.82) 62%);
      transition: opacity 600ms ease;
    }
    #message.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #message h2 {
      font-family: var(--font-display);
      font-size: clamp(2.6rem, 7vw, 6.5rem);
      font-weight: 300;
      font-style: italic;
      line-height: 0.92;
    }
    #message p {
      max-width: 42rem;
      margin: 1.2rem auto 0;
      color: var(--muted);
      font-size: clamp(0.9rem, 1.7vw, 1.15rem);
      line-height: 1.7;
      letter-spacing: 0.04em;
    }
    @media (max-width: 760px), (max-aspect-ratio: 4 / 5) {
      html, body { overflow: auto; }
      #display {
        position: relative;
        min-height: 100svh;
        padding: 12px;
      }
      #stage {
        min-height: calc(100svh - 24px);
        height: calc(100svh - 24px);
      }
      #topline, #bottomline {
        left: 14px;
        right: 14px;
      }
      #bottomline {
        align-items: flex-start;
        flex-direction: column;
      }
      #titleBlock {
        max-width: 100%;
      }
      #reading {
        max-width: 100%;
      }
      .pill {
        min-height: 38px;
        padding: 0.58rem 0.7rem;
        letter-spacing: 0.1em;
      }
      .sound-pill {
        width: 38px;
        min-width: 38px;
        height: 38px;
        min-height: 38px;
        padding: 0;
        letter-spacing: 0;
      }
    }
  </style>
</head>
<body>
  <main id="display" aria-live="polite">
    <section id="stage">
      <canvas id="dream" aria-label="Daily procedural dreamscape"></canvas>
      <div id="message">
        <div>
          <h2>Waiting For The Signal</h2>
          <p>The display is listening for the newest public dreamscape. If last night has not arrived yet, the latest available visual will keep the room company.</p>
        </div>
      </div>
      <div class="overlay" id="bottomline">
        <div id="titleBlock">
          <p id="reading">Turning my biometrics into daily art.</p>
        </div>
        <div class="overlay" style="position: static; justify-content: flex-end;">
          <a class="pill" id="url" href="https://manu.vision/dreamart/" aria-label="Open Dream Art gallery">manu.vision/dreamart</a>
	          <span class="pill" id="date" role="button" tabindex="0" aria-label="Choose display date">Today</span>
          <span class="pill" id="score">Score --</span>
          <button class="pill sound-pill" id="soundToggle" type="button" aria-label="Ambient sound off" title="Ambient sound off">🔇</button>
        </div>
      </div>
	    </section>
	  </main>
	  <div class="date-modal-backdrop" id="dateModal" role="dialog" aria-modal="true" aria-label="Choose display date">
	    <div class="date-modal">
	      <div class="date-fields">
	        <div class="date-picker-row">
	          <div class="date-field">
	            <label for="modalDate">Select Date</label>
	            <input id="modalDate" type="date" />
	          </div>
	          <button class="date-today" id="modalToday" type="button">Today</button>
	        </div>
	        <button class="date-apply" id="modalApply" type="button">Filter →</button>
	      </div>
	    </div>
	  </div>
	  <script>
    const API = 'https://dreamart.manu.vision/api/procedural-public';
    const REFRESH_MS = 30 * 60 * 1000;
    const dream = document.getElementById('dream');
    const message = document.getElementById('message');
	    const reading = document.getElementById('reading');
	    const datePill = document.getElementById('date');
	    const scorePill = document.getElementById('score');
	    const soundToggle = document.getElementById('soundToggle');
	    const dateModal = document.getElementById('dateModal');
	    const modalDate = document.getElementById('modalDate');
	    const modalToday = document.getElementById('modalToday');
	    const modalApply = document.getElementById('modalApply');
	    let renderer = null;
	    let currentDate = '';
	    let archiveItems = [];
	    let raf = 0;
    const soundStates = [
      { id: 'off', icon: '🔇', label: 'Ambient sound off' },
      { id: 'rainforest', icon: '🌧', label: 'Rainforest ambience', src: 'audio/rainforest.mp3' },
      { id: 'fireplace', icon: '🔥', label: 'Fireplace ambience', src: 'audio/fireplace.mp3' },
      { id: 'ocean', icon: '🌊', label: 'Ocean waves ambience', src: 'audio/ocean-waves.mp3' },
    ];
    const audio = new Audio();
    audio.loop = true;
    audio.preload = 'none';
    audio.volume = 0.55;
    let soundIndex = 0;

    function todayIso() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

	    function scoreColor(score) {
      if (score == null) return '#c4b5fd';
      if (score >= 86) return '#8B5CF6';
      if (score >= 71) return '#3A78B8';
      if (score >= 56) return '#4D7C5A';
      if (score >= 41) return '#D4A853';
      return '#C8613A';
	    }

	    function hexToRgb(hex) {
	      const clean = String(hex || '').replace('#', '');
	      const num = parseInt(clean.length === 3
	        ? clean.split('').map(ch => ch + ch).join('')
	        : clean, 16);
	      if (!Number.isFinite(num)) return [167, 139, 250];
	      return [(num >> 16) & 255, (num >> 8) & 255, num & 255];
	    }

    function formatDate(iso) {
      return new Date(`${iso}T12:00:00`).toLocaleDateString('en-US', {
        weekday: 'long',
        month: 'long',
        day: 'numeric',
        year: 'numeric',
      });
    }

	    function normalizeItems(data) {
	      return Array.isArray(data)
	        ? data
	            .filter(item => item && item.date && Number.isFinite(Number(item.sleepScore)))
	            .sort((a, b) => a.date.localeCompare(b.date))
	        : [];
	    }

	    function itemForDate(date) {
	      return archiveItems.find(item => item.date === date) || null;
	    }

	    function latestItem() {
	      return archiveItems[archiveItems.length - 1] || null;
	    }

	    function requestedDate() {
	      const params = new URLSearchParams(window.location.search);
	      return params.get('date') || params.get('day') || '';
	    }

    function resize() {
      if (!renderer) return;
      const rect = dream.getBoundingClientRect();
      renderer.resize(rect.width, rect.height, 2);
    }

    function animate(now) {
      if (!renderer) {
        raf = 0;
        return;
      }
      resize();
      renderer.render(now);
      raf = requestAnimationFrame(animate);
    }

	    function start(item) {
      if (!window.DreamPointcloudEngine) throw new Error('Dream renderer unavailable');
      if (!renderer) {
        renderer = new window.DreamPointcloudEngine.DreamRenderer(dream, { budget: 10000 });
        window.DreamPointcloudEngine.attachInteraction(renderer, dream);
        window.addEventListener('resize', resize);
      }
	      renderer.setItem(item);
      renderer.resetView();
      renderer.waveOverrideE = null;
      renderer._t0 = null;
	      currentDate = item.date;
	      const accent = scoreColor(item.sleepScore);
	      const rgb = hexToRgb(accent).join(', ');
	      document.documentElement.style.setProperty('--accent', accent);
	      document.documentElement.style.setProperty('--accent-rgb', rgb);
	      resize();
      dream.classList.add('ready');
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(animate);
    }

	    function updateUi(item) {
      reading.textContent = item.reading || 'A new biometric signal becomes shape, color, material, and atmosphere.';
      datePill.textContent = item.label || formatDate(item.date);
      scorePill.textContent = `Score ${item.sleepScore}`;
      scorePill.style.setProperty('--score-color', scoreColor(item.sleepScore));
      message.classList.add('hidden');
	    }

	    function showGap(date) {
	      currentDate = date || currentDate;
	      dream.classList.remove('ready');
	      message.classList.remove('hidden');
	      message.querySelector('h2').textContent = 'The Night Has Not Settled Yet';
	      message.querySelector('p').textContent = date
	        ? `${formatDate(date)} has not become a public procedural dreamscape yet. Choose another night, or let the archive keep breathing with the latest available entry.`
	        : 'No public procedural dreamscape is available yet.';
	      datePill.textContent = date ? formatDate(date) : 'Choose a date';
	      scorePill.textContent = 'Score --';
	    }

	    function setDisplayItem(item, options = {}) {
	      if (!item) return;
	      updateUi(item);
	      start(item);
	      modalDate.value = item.date;
	      if (!options.keepUrl) {
	        const url = new URL(window.location.href);
	        url.searchParams.set('date', item.date);
	        history.replaceState(null, '', url.toString());
	      }
	    }

	    function setDisplayDate(date, options = {}) {
	      const item = itemForDate(date);
	      if (!item) {
	        showGap(date);
	        return;
	      }
	      setDisplayItem(item, options);
	    }

	    function navigateDate(step) {
	      if (!archiveItems.length) return;
	      const index = archiveItems.findIndex(item => item.date === currentDate);
	      const base = index >= 0 ? index : archiveItems.length - 1;
	      const next = archiveItems[(base + step + archiveItems.length) % archiveItems.length];
	      setDisplayItem(next);
	    }

	    function openDateModal() {
	      modalDate.value = currentDate || requestedDate() || latestItem()?.date || todayIso();
	      dateModal.classList.add('open');
	      setTimeout(() => modalDate.focus(), 0);
	    }

	    function closeDateModal() {
	      dateModal.classList.remove('open');
	    }

	    async function loadLatest() {
	      try {
	        const res = await fetch(`${API}?t=${Date.now()}`, { cache: 'no-store' });
	        if (!res.ok) throw new Error('Could not load daily dreamscape');
	        archiveItems = normalizeItems(await res.json());
	        const requested = requestedDate();
	        const item = requested ? itemForDate(requested) : latestItem();
	        if (!item) throw new Error('No public dreamscape is available yet');
	        if (item.date !== currentDate) setDisplayItem(item, { keepUrl: Boolean(requested) });
	      } catch (error) {
	        console.error(error);
	        showGap(requestedDate());
	      }
	    }

    function renderSoundToggle() {
      const state = soundStates[soundIndex];
      soundToggle.textContent = state.icon;
      soundToggle.setAttribute('aria-label', state.label);
      soundToggle.title = state.label;
    }

    async function setSound(index) {
      soundIndex = index % soundStates.length;
      const state = soundStates[soundIndex];
      renderSoundToggle();
      if (!state.src) {
        audio.pause();
        audio.removeAttribute('src');
        audio.load();
        return;
      }
      if (!audio.src.endsWith(state.src)) {
        audio.src = state.src;
      }
      audio.currentTime = 0;
      try {
        await audio.play();
      } catch (error) {
        console.warn('Ambient sound could not start yet.', error);
      }
    }

	    soundToggle.addEventListener('click', () => {
	      setSound(soundIndex + 1);
	    });
	    datePill.addEventListener('click', openDateModal);
	    datePill.addEventListener('keydown', (event) => {
	      if (event.key === 'Enter' || event.key === ' ') {
	        event.preventDefault();
	        openDateModal();
	      }
	    });
	    dateModal.addEventListener('click', (event) => {
	      if (event.target === dateModal) closeDateModal();
	    });
	    modalToday.addEventListener('click', () => {
	      modalDate.value = todayIso();
	      modalDate.focus();
	    });
	    modalApply.addEventListener('click', () => {
	      if (!modalDate.value) return;
	      setDisplayDate(modalDate.value);
	      closeDateModal();
	    });
	    document.addEventListener('keydown', (event) => {
	      const tag = document.activeElement?.tagName;
	      const isTyping = tag === 'INPUT' || tag === 'TEXTAREA' || document.activeElement?.isContentEditable;
	      if (event.key === 'Escape' && dateModal.classList.contains('open')) {
	        closeDateModal();
	        return;
	      }
	      if (isTyping || dateModal.classList.contains('open')) return;
	      if (event.key === 'ArrowRight') {
	        event.preventDefault();
	        navigateDate(1);
	      } else if (event.key === 'ArrowLeft') {
	        event.preventDefault();
	        navigateDate(-1);
	      }
	    });

    window.addEventListener('visibilitychange', () => {
      if (!document.hidden) loadLatest();
      if (document.hidden) audio.pause();
      if (!document.hidden && soundStates[soundIndex].src) audio.play().catch(() => {});
    });
    window.addEventListener('online', loadLatest);
    setInterval(loadLatest, REFRESH_MS);
    renderSoundToggle();
    loadLatest();
  </script>
</body>
</html>
